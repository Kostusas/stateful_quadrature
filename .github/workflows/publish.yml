name: Publish to PyPI

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate release tag and package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          if re.fullmatch(r"v\d+\.\d+\.\d+", tag) is None:
              raise SystemExit(
                  f"Release tag {tag!r} is invalid. Expected format: vX.Y.Z"
              )

          version = tag[1:]

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          pyproject_version = pyproject["project"]["version"]
          if pyproject_version != version:
              raise SystemExit(
                  "pyproject.toml version mismatch: "
                  f"expected {version!r}, found {pyproject_version!r}"
              )

          version_ns = {}
          exec(pathlib.Path("stateful_quadrature/_version.py").read_text(), version_ns)
          module_version = version_ns["__version__"]
          if module_version != version:
              raise SystemExit(
                  "stateful_quadrature/_version.py version mismatch: "
                  f"expected {version!r}, found {module_version!r}"
              )

          print(f"Validated release tag and package version: {tag}")
          PY

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build source and wheel distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload release distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
    permissions:
      id-token: write

    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
